name: Build Activity Tracker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar librsvg (renderização do SVG)
        run: brew install librsvg

      - name: Instalar dependências Python
        run: pip install pyinstaller pywebview psutil Pillow

      - name: Build
        run: python build.py

      - name: Zipar .app bundle
        run: cd dist && zip -r ../ActivityTracker-macOS.zip ActivityTracker.app

      - name: Upload artefato macOS
        uses: actions/upload-artifact@v4
        with:
          name: ActivityTracker-macOS
          path: ActivityTracker-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências Python
        run: pip install pyinstaller pywebview psutil pywin32 Pillow

      - name: Build
        run: python build.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload artefato Windows
        uses: actions/upload-artifact@v4
        with:
          name: ActivityTracker-Windows
          path: dist/ActivityTracker.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ActivityTracker-macOS
          path: ./release

      - uses: actions/download-artifact@v4
        with:
          name: ActivityTracker-Windows
          path: ./release

      - name: Renomear Windows exe
        run: mv ./release/ActivityTracker.exe ./release/ActivityTracker-Windows.exe

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/ActivityTracker-macOS.zip
            ./release/ActivityTracker-Windows.exe
          generate_release_notes: true
